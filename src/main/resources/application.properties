spring.application.name=RaceTrack

spring.security.oauth2.client.registration.okta.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}

spring.datasource.url=jdbc:postgresql://localhost:5432/racetrack
spring.datasource.username=racetrackuser
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

racetrack.notifications.email.enabled=${RACETRACK_EMAIL_NOTIFICATIONS_ENABLED:false}
racetrack.notifications.email.from=${GMAIL_USERNAME:no-reply@racetrack.local}
racetrack.notifications.email.subject-prefix=[RaceTrack]

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${GMAIL_USERNAME:}
spring.mail.password=${GMAIL_APP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
