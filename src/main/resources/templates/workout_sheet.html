<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="workoutSheet">

  <div id="workoutSpreadsheet"
       class="spreadsheet-container mt-5"
       style="display:none;">

    <h4 class="mb-3">
      Workout Logs
      <span id="workoutSheetAthleteLabel" class="sheet-athlete-context"></span>
    </h4>
    <div class="sheet-filter-bar mb-2">
      <span class="sheet-filter-label">Filter:</span>
      <button id="workout-filter-today" class="btn btn-sm btn-outline-secondary" onclick="setDateFilter('workout', 'today')">Today</button>
      <button id="workout-filter-week" class="btn btn-sm btn-outline-secondary" onclick="setDateFilter('workout', 'week')">Week</button>
      <button id="workout-filter-month" class="btn btn-sm btn-outline-secondary" onclick="setDateFilter('workout', 'month')">Month</button>
      <button id="workout-filter-custom" class="btn btn-sm btn-outline-secondary" onclick="setDateFilter('workout', 'custom')">Custom</button>
      <div id="workout-custom-filter-inputs" class="sheet-custom-filter d-none">
        <input id="workout-custom-start" type="date" class="form-control form-control-sm sheet-custom-date-input" aria-label="Workout logs custom start date">
        <span class="sheet-custom-filter-separator">to</span>
        <input id="workout-custom-end" type="date" class="form-control form-control-sm sheet-custom-date-input" aria-label="Workout logs custom end date">
      </div>
    </div>

    <div class="table-responsive">
      <table class="table table-bordered table-sm spreadsheet-table workout-table">
        <thead class="table-light">
        <tr>
          <th>Date</th>
          <th th:if="${!isCoach}" id="workout-actions-header" style="display:none;">Actions</th>
          <th>Workout Type</th>
          <th>Completion Details</th>
          <th>Actual Paces</th>
          <th>Description</th>
          <th>Coach Comment</th>
        </tr>
        </thead>

        <tbody id="workoutSpreadsheetBody">
        <!-- JS injects rows -->
        </tbody>
      </table>
    </div>

  </div>

</div>

</body>
</html>
