<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Access Required</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/header.css}">
</head>
<body>
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
      <div class="card shadow-sm border-0">
        <div class="card-body p-4 p-md-5">
          <h1 class="h3 mb-3">Access to RaceTrack was not approved</h1>
          <p class="text-muted mb-3">
            Your email address is not currently listed in the RaceTrack user database.
          </p>
          <p class="mb-4" th:if="${email != null and !#strings.isEmpty(email)}">
            Signed in as <strong th:text="${email}">user@example.com</strong>
          </p>
          <p class="mb-4">
            Please reach out to your coach so they can add your email before you try again.
          </p>
          <form th:action="@{/logout}" method="post">
            <button type="submit" class="btn btn-primary">Sign out</button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
