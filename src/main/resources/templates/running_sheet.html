<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="runningSheet">

  <div id="runningSpreadsheet"
       class="spreadsheet-container"
       style="display:none;">

    <h4 class="mb-3">
      Running Logs
      <span id="runningSheetAthleteLabel" class="sheet-athlete-context"></span>
    </h4>
    <div class="sheet-filter-bar mb-2">
      <span class="sheet-filter-label">Filter:</span>
      <button id="running-filter-today" class="btn btn-sm btn-outline-secondary" onclick="setDateFilter('running', 'today')">Today</button>
      <button id="running-filter-week" class="btn btn-sm btn-outline-secondary" onclick="setDateFilter('running', 'week')">Week</button>
      <button id="running-filter-month" class="btn btn-sm btn-outline-secondary" onclick="setDateFilter('running', 'month')">Month</button>
      <button th:if="${isCoach}" id="running-filter-custom" class="btn btn-sm btn-outline-secondary" onclick="setDateFilter('running', 'custom')">Custom</button>
      <div th:if="${isCoach}" id="running-custom-filter-inputs" class="sheet-custom-filter d-none">
        <input id="running-custom-start" type="date" class="form-control form-control-sm sheet-custom-date-input" aria-label="Running logs custom start date">
        <span class="sheet-custom-filter-separator">to</span>
        <input id="running-custom-end" type="date" class="form-control form-control-sm sheet-custom-date-input" aria-label="Running logs custom end date">
      </div>
    </div>

    <div class="table-responsive">
      <table class="table table-bordered table-sm spreadsheet-table running-table">
        <thead class="table-light">
        <tr>
          <th>Date</th>
          <th th:if="${!isCoach}" id="running-actions-header" style="display:none;">Actions</th>
          <th>Miles</th>
          <th>Hurting?</th>
          <th>Sleep</th>
          <th>Stress</th>
          <th>Plate Proportions On?</th>
          <th>Did You Get That Bread?</th>
          <th>How Feel?</th>
          <th>RPE</th>
          <th>Athlete Details</th>
          <th>Coach Comment</th>
        </tr>
        </thead>

        <tbody id="runningSpreadsheetBody">
        <!-- JS injects rows -->
        </tbody>
      </table>
    </div>

  </div>

</div>

</body>
</html>
