<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>RaceTrack Coach</title>
  <meta name="_csrf" th:content="${_csrf.token}">
  <meta name="_csrf_header" th:content="${_csrf.headerName}">

  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="stylesheet" th:href="@{/css/header.css}">
  <link rel="stylesheet" th:href="@{/css/home.css}">
  <link rel="stylesheet" th:href="@{/css/footer.css}">
  <link rel="stylesheet" th:href="@{/css/running_sheet.css}">
  <link rel="stylesheet" th:href="@{/css/workout_sheet.css}">
</head>

<body>

<div class="container mt-5">

  <div th:replace="~{header :: headerFragment}"></div>

  <div class="form-container">
    <div th:if="${param.sessionExpired}" class="alert alert-warning mb-3" role="alert">
      Your session expired while the page was open. Please sign in again and retry the action.
    </div>
    <div id="saveNotice" class="alert d-none mb-3" role="status" aria-live="polite"></div>

    <div id="emptyState" class="empty-state">
      <p class="text-muted mb-0">
        Select an athlete below to view and comment on logs
      </p>
    </div>

    <div th:replace="~{running_sheet :: runningSheet}"></div>
    <div th:replace="~{workout_sheet :: workoutSheet}"></div>
  </div>

</div>

<div th:replace="~{footer :: footerFragment}"></div>

<div class="modal fade" id="createUserModal" tabindex="-1" aria-labelledby="createUserModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <form id="createUserForm">
        <div class="modal-header">
          <h5 class="modal-title" id="createUserModalLabel">Create User</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label" for="userFirstName">First name</label>
              <input class="form-control" id="userFirstName" name="firstName" required>
            </div>
            <div class="col-md-6">
              <label class="form-label" for="userLastName">Last name</label>
              <input class="form-control" id="userLastName" name="lastName" required>
            </div>
            <div class="col-12">
              <label class="form-label" for="userEmail">Email</label>
              <input type="email" class="form-control" id="userEmail" name="email" required>
            </div>
            <div class="col-12">
              <label class="form-label" for="userRole">Role</label>
              <select class="form-select" id="userRole" name="role" required>
                <option value="athlete">Athlete</option>
                <option value="coach">Coach</option>
              </select>
              <div class="form-text">
                Athletes can submit and edit only their own logs. Coaches can view all logs, comment, and use admin actions.
              </div>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="submit" class="btn btn-primary" id="createUserSubmitButton">Create User</button>
        </div>
      </form>
    </div>
  </div>
</div>

<div class="modal fade" id="editUserModal" tabindex="-1" aria-labelledby="editUserModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <form id="editUserForm">
        <div class="modal-header">
          <h5 class="modal-title" id="editUserModalLabel">Edit User</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label" for="editUserFirstName">First name</label>
              <input class="form-control" id="editUserFirstName" name="firstName" required>
            </div>
            <div class="col-md-6">
              <label class="form-label" for="editUserLastName">Last name</label>
              <input class="form-control" id="editUserLastName" name="lastName" required>
            </div>
            <div class="col-12">
              <label class="form-label" for="editUserEmail">Email</label>
              <input type="email" class="form-control" id="editUserEmail" name="email" required>
            </div>
            <div class="col-12">
              <label class="form-label" for="editUserRole">Role</label>
              <select class="form-select" id="editUserRole" name="role" required>
                <option value="athlete">Athlete</option>
                <option value="coach">Coach</option>
              </select>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="submit" class="btn btn-primary" id="editUserSubmitButton">Save Changes</button>
        </div>
      </form>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:inline="javascript">
  window.currentUserRole = /*[[${currentUserRole}]]*/ "coach";
  window.currentUserId = /*[[${currentUserId}]]*/ "";
  window.currentUserName = /*[[${currentUserName}]]*/ "";
</script>
<script th:src="@{/js/home.js}"></script>
<script th:src="@{/js/sheets.js}"></script>

</body>
</html>
