<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>RaceTrack Coach</title>
  <meta name="_csrf" th:content="${_csrf.token}">
  <meta name="_csrf_header" th:content="${_csrf.headerName}">

  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="stylesheet" th:href="@{/css/home.css}">
  <link rel="stylesheet" th:href="@{/css/footer.css}">
  <link rel="stylesheet" th:href="@{/css/running_sheet.css}">
  <link rel="stylesheet" th:href="@{/css/workout_sheet.css}">
</head>

<body>

<div class="container mt-5">

  <div th:replace="header :: headerFragment"></div>

  <div class="form-container">
    <div id="saveNotice" class="alert d-none mb-3" role="status" aria-live="polite"></div>

    <div id="emptyState" class="empty-state">
      <p class="text-muted mb-0">
        Select an athlete below to view and comment on logs
      </p>
    </div>

    <div th:replace="running_sheet :: runningSheet"></div>
    <div th:replace="workout_sheet :: workoutSheet"></div>
  </div>

</div>

<div th:replace="footer :: footerFragment"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:inline="javascript">
  window.currentUserRole = /*[[${currentUserRole}]]*/ "coach";
  window.currentUserId = /*[[${currentUserId}]]*/ "";
</script>
<script th:src="@{/js/home.js}"></script>
<script th:src="@{/js/sheets.js}"></script>

</body>
</html>
