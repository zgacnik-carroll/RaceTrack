<div th:fragment="headerFragment">

  <div class="header-shell mb-4">

    <div class="logo-wrapper">
      <img src="/images/CarrollLogo.png" alt="RaceTrack Logo" class="app-logo">
    </div>

    <div class="header-bar">
      <div class="header-brand">
        <div class="brand-row">
          <h1 class="app-title">
            RaceTrack -
            <span th:text="${isCoach} ? 'Coach' : 'Athlete'">Athlete</span>
          </h1>
        </div>
        <div class="signed-in-text">
          Signed in as <span th:text="${currentUserName}">User</span>
        </div>
      </div>

      <div class="header-actions">
        <div class="button-group" th:if="${!isCoach}">
          <button class="btn btn-outline-primary" onclick="showForm('running')">Running Log</button>
          <button class="btn btn-outline-success" onclick="showForm('workout')">Workout Log</button>
          <button class="btn btn-outline-primary" onclick="showRunningSheet('me')">My Running Sheet</button>
          <button class="btn btn-outline-success" onclick="showWorkoutSheet('me')">My Workout Sheet</button>
        </div>
        <div class="coach-header-tools" th:if="${isCoach}">
          <div class="coach-header-buttons">
            <button type="button"
                    class="btn btn-light coach-header-primary"
                    data-bs-toggle="modal"
                    data-bs-target="#createUserModal">
              Add User
            </button>
            <div class="dropdown">
              <button type="button"
                      class="btn btn-outline-light dropdown-toggle"
                      data-bs-toggle="dropdown"
                      aria-expanded="false">
                Edit User
              </button>
              <ul class="dropdown-menu dropdown-menu-end coach-athlete-menu">
                <li th:each="user : ${manageableUsers}">
                  <button type="button"
                          class="dropdown-item"
                          th:attr="data-name=${user.fullName},data-email=${user.email},data-user-id=${user.id},data-role=${user.role},data-display-name=${user.fullName != null and !#strings.isEmpty(user.fullName) ? user.fullName : user.email}"
                          onclick="openEditUserModalFor(this)"
                          th:text="${(user.fullName != null and !#strings.isEmpty(user.fullName) ? user.fullName : user.email) + ' (' + user.role + ')'}">
                    User
                  </button>
                </li>
              </ul>
            </div>
            <div class="dropdown">
              <button type="button"
                      class="btn btn-outline-light dropdown-toggle"
                      data-bs-toggle="dropdown"
                      aria-expanded="false">
                Delete User
              </button>
              <ul class="dropdown-menu dropdown-menu-end coach-athlete-menu">
                <li th:each="user : ${manageableUsers}">
                  <button type="button"
                          class="dropdown-item"
                          th:attr="data-name=${user.fullName},data-email=${user.email},data-user-id=${user.id},data-role=${user.role},data-display-name=${user.fullName != null and !#strings.isEmpty(user.fullName) ? user.fullName : user.email}"
                          onclick="deleteUserFor(this)"
                          th:text="${(user.fullName != null and !#strings.isEmpty(user.fullName) ? user.fullName : user.email) + ' (' + user.role + ')'}">
                    User
                  </button>
                </li>
              </ul>
            </div>
            <button type="button"
                    class="btn btn-outline-light"
                    onclick="clearData()">
              Clear Data
            </button>
          </div>
        </div>
      </div>
      <form th:action="@{/logout}" method="post" class="logout-form">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <button type="submit" class="btn btn-outline-danger">Logout</button>
      </form>

    </div>

  </div>

</div>
